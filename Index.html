// ═══════════════════════════════════════════════════════════════
// CRYPTO — password hashing using Web Crypto API
// ═══════════════════════════════════════════════════════════════
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + "heyv_salt_2025");
  const hash = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function getUsers() {
  const r = await storageGet(USERS_STORAGE);
  return r || {};
}
async function saveUsers(users) {
  await storageSet(USERS_STORAGE, users);
}
async function registerUser(email, password, name) {
  try {
    const res = await fetch(API_URL + "/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password, name }),
    });
    const data = await res.json();
    if (data.ok && data.token) {
      await storageSet("heyv_token", data.token);
    }
    return data;
  } catch {
    // Fallback to local if backend unreachable
    const users = await getUsers();
    const key = email.toLowerCase().trim();
    if (users[key]) return { ok:false, error:"Email already registered" };
    const hashed = await hashPassword(password);
    users[key] = { email:key, name, password:hashed, plan:"Free", createdAt: Date.now() };
    await saveUsers(users);
    return { ok:true, user:{ email:key, name, plan:"Free" } };
  }
}
async function loginUser(email, password) {

    if (data.ok && data.token) {
      await storageSet("heyv_token", data.token);
    }

    // Fallback to local if backend unreachable
    const users = await getUsers();
    const key = email.toLowerCase().trim();
    if (!users[key]) return { ok:false, error:"Email not found" };
    const hashed = await hashPassword(password);

    const { password:_, ...safe } = users[key];
    return { ok:true, user:safe };
  }
}

// AUDIO ENGINE
// ═══════════════════════════════════════════════════════════════
class AudioEngine {
  constructor() { this.ctx = null; this.oscNodes = []; }
  _getCtx() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    return this.ctx;
  }
  beep(freq = 440, dur = 0.15, vol = 0.3) {
    try {
      const ctx = this._getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = "sine";
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.01);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + dur);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
    } catch {}
  }
  playSong(freq) {
    this.stopSong();
    try {
      const ctx = this._getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      osc.type = "triangle"; osc.frequency.value = freq;
      filter.type = "lowpass"; filter.frequency.value = 900;
      gain.gain.value = 0.1;
      osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      osc.start();
      this.oscNodes = [osc, gain, filter];
    } catch {}
  }
  stopSong() {
    this.oscNodes.forEach(n => { try { n.disconnect(); if (n.stop) n.stop(); } catch {} });
    this.oscNodes = [];
  }
  wake()    { this.beep(660, 0.08); setTimeout(() => this.beep(880, 0.1), 110); }
  confirm() { [440, 550, 660].forEach((f, i) => setTimeout(() => this.beep(f, 0.09), i * 90)); }
  success() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => this.beep(f, 0.12), i * 100)); }
  error()   { this.beep(200, 0.25, 0.25); }
}
const audio = new AudioEngine();

let synthActive = true;
// ── MIC VOLUME ANALYSER ──────────────────────────────────────
function startVolumeAnalyser(onVolume) {
  try {
    navigator.mediaDevices.getUserMedia({ audio:true }).then(stream => {
      const ctx      = new (window.AudioContext || window.webkitAudioContext)();
      const source   = ctx.createMediaStreamSource(stream);
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      const data = new Uint8Array(analyser.frequencyBinCount);
      const tick = () => {
        analyser.getByteFrequencyData(data);
        const avg = data.reduce((a,b) => a+b, 0) / data.length;
        onVolume(Math.min(100, avg * 2));
        return requestAnimationFrame(tick);
      };
      const id = tick();
      return () => { cancelAnimationFrame(id); stream.getTracks().forEach(t=>t.stop()); ctx.close(); };
    });
  } catch {}
}

function speak(text) {
  if (!synthActive) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.05; u.pitch = 1.1; u.volume = 0.9;
    window.speechSynthesis.speak(u);
  } catch {}
}
function cleanupSpeech() { synthActive = false; try { window.speechSynthesis.cancel(); } catch {} }

async function callAI(transcript, contactNames, plan) {
  try {
    const token = await storageGet("heyv_token");
    const res = await fetch(API_URL + "/api/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + (token || ""),
      },
      body: JSON.stringify({ transcript, contacts: contactNames, plan }),
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.ok ? data.result : null;
  } catch { return null; }
}

function loadFLW() {
  return new Promise(resolve => {
    if (window.FlutterwaveCheckout) { resolve(true); return; }
    const s = document.createElement("script");
    s.src = "https://checkout.flutterwave.com/v3.js";
    s.onload  = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
}
async function payWithFLW({ publicKey, plan, name, email, phone, onSuccess, onClose }) {
  const loaded = await loadFLW();
  if (!loaded || !window.FlutterwaveCheckout) { alert("Payment gateway failed to load. Check your internet."); return; }
  window.FlutterwaveCheckout({
    public_key: publicKey,
    tx_ref: `heyv_${Date.now()}`,
    amount: plan.price,
    currency: "USD",
    payment_options: "card,mobilemoney,ussd,banktransfer",
    customer: { name, email, phone_number: phone },
    customizations: { title: "Hey V", description: `${plan.name} — ${plan.tag}/month` },
    callback: r => { if (r.status === "successful" || r.status === "completed") onSuccess(r); },
    onclose: onClose,
  });
}
